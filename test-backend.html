<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Backend Test</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
    button { padding: 15px 30px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { margin-top: 20px; padding: 15px; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .loading { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <h1>🔍 Backend Connection Test</h1>
  <p>This will test if your Render backend is responding correctly.</p>
  
  <button onclick="testBackend()">Test Backend Now</button>
  
  <div id="result"></div>

  <script>
    async function testBackend() {
      const resultDiv = document.getElementById('result');
      resultDiv.className = 'result loading';
      resultDiv.innerHTML = '⏳ Testing connection to Render backend...<br>This may take 30-60 seconds if backend is sleeping...';
      
      const startTime = Date.now();
      
      try {
        const response = await fetch('https://go-study-backend.onrender.com/api/generate-plan', {
          method: 'POST',
          body: new FormData() // Empty form to trigger error but test connection
        });
        
        const duration = ((Date.now() - startTime) / 1000).toFixed(2);
        
        resultDiv.className = 'result success';
        resultDiv.innerHTML = `
          ✅ <strong>Backend is RESPONDING!</strong><br>
          Response time: ${duration} seconds<br>
          Status: ${response.status}<br><br>
          <strong>This means your backend is working correctly!</strong><br>
          The issue is with Vercel not deploying the latest code.
        `;
        
      } catch (error) {
        const duration = ((Date.now() - startTime) / 1000).toFixed(2);
        
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `
          ❌ <strong>Connection Failed</strong><br>
          Error: ${error.message}<br>
          Time: ${duration} seconds<br><br>
          This means the backend might be down or unreachable.
        `;
      }
    }
  </script>
</body>
</html>
