<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Test - GoStudy!</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { padding: 10px 20px; background: #007AFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>GoStudy! API Connection Test</h1>
  
  <div id="status"></div>
  
  <h2>Test 1: Check API URL Configuration</h2>
  <button onclick="testApiUrl()">Test API URL</button>
  <div id="url-result"></div>
  
  <h2>Test 2: Test Backend Connection</h2>
  <button onclick="testBackend()">Test Backend</button>
  <div id="backend-result"></div>
  
  <h2>Test 3: Upload Test File</h2>
  <input type="file" id="test-file" accept=".pdf,.txt,.docx">
  <button onclick="testUpload()">Upload Test</button>
  <div id="upload-result"></div>

  <script>
    const API_URL = 'https://go-study-backend.onrender.com/api/generate-plan';
    
    function log(elementId, message, type = 'info') {
      const div = document.getElementById(elementId);
      div.innerHTML += `<div class="status ${type}">${message}</div>`;
    }
    
    function testApiUrl() {
      const result = document.getElementById('url-result');
      result.innerHTML = '';
      log('url-result', `API URL: ${API_URL}`, 'info');
      log('url-result', `Current Domain: ${window.location.hostname}`, 'info');
    }
    
    async function testBackend() {
      const result = document.getElementById('backend-result');
      result.innerHTML = '';
      log('backend-result', 'Testing backend connection...', 'info');
      
      try {
        // Test if backend is awake (might take 30s if sleeping)
        const response = await fetch('https://go-study-backend.onrender.com', {
          method: 'GET'
        });
        
        log('backend-result', `Backend Status: ${response.status}`, 'info');
        log('backend-result', `Backend is responding! (404 is expected for GET /)`, 'success');
        
      } catch (error) {
        log('backend-result', `Error: ${error.message}`, 'error');
        log('backend-result', 'Backend might be sleeping. Wait 30 seconds and try again.', 'error');
      }
    }
    
    async function testUpload() {
      const result = document.getElementById('upload-result');
      result.innerHTML = '';
      
      const fileInput = document.getElementById('test-file');
      if (!fileInput.files[0]) {
        log('upload-result', 'Please select a file first!', 'error');
        return;
      }
      
      const file = fileInput.files[0];
      log('upload-result', `File: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`, 'info');
      log('upload-result', `Type: ${file.type}`, 'info');
      
      const formData = new FormData();
      formData.append('document', file);
      
      log('upload-result', 'Uploading to backend... (may take 30s if backend is sleeping)', 'info');
      
      try {
        const startTime = Date.now();
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });
        
        const duration = ((Date.now() - startTime) / 1000).toFixed(2);
        log('upload-result', `Response received in ${duration}s`, 'info');
        log('upload-result', `Status: ${response.status}`, 'info');
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          log('upload-result', `Error Response: ${JSON.stringify(errorData, null, 2)}`, 'error');
          throw new Error(`Server returned ${response.status}`);
        }
        
        const data = await response.json();
        log('upload-result', '✅ SUCCESS! Study plan generated:', 'success');
        log('upload-result', `<pre>${JSON.stringify(data, null, 2)}</pre>`, 'success');
        
      } catch (error) {
        log('upload-result', `❌ Upload Failed: ${error.message}`, 'error');
        console.error('Full error:', error);
      }
    }
    
    // Auto-run URL test on load
    window.onload = () => {
      log('status', '🔍 API Test Page Loaded', 'success');
      testApiUrl();
    };
  </script>
</body>
</html>
